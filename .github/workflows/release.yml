name: Release

on:
  push:
    tags:
      - v*

jobs:
  bump-version: 
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      skip: ${{ steps.check-version.outputs.skip }}

    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if version bump is needed
        id: check-version
        run: |
          CURRENT_VERSION=$(grep -oP 'version = "\K[^"]+' pyproject.toml)
          TAG_VERSION=${{ steps.version.outputs.version }}
          if [ "$CURRENT_VERSION" = "$TAG_VERSION" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Version $TAG_VERSION already matches pyproject.toml, skipping bump"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Bump version
        if: steps.check-version.outputs.skip == 'false'
        run: uv version ${{ steps.version.outputs.version }}

      - name: Commit, push and update tag
        if: steps.check-version.outputs.skip == 'false'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          git add pyproject.toml uv.lock
          git commit -m "chore: bump version to ${{ steps.version.outputs.version }}"
          git push origin ${{ github.event.repository.default_branch }}
          
          git tag -f ${{ github.ref_name }}
          git push origin ${{ github.ref_name }} --force

  build:
    needs: bump-version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout updated tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Build package
        run: uv build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*

  publish-to-pypi:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist

      - name: Publish to PyPI
        run: uv publish
